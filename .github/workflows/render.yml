name: Render Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Tema do vídeo'
        required: true
        default: 'A fé de Abraão'
      user_id:
        description: 'ID do Usuário (Supabase)'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Remotion Dependencies
        working-directory: ./remotion
        run: npm install

      - name: Render Video
        env:
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          TYPECAST_API_KEY: ${{ secrets.TYPECAST_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python main.py --topic "${{ github.event.inputs.topic }}" --user_id "${{ github.event.inputs.user_id }}"

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: output/videos/*.mp4
